<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ url_for('static', filename='img/fav/favicon.ico') }}" type="image">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/fav/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/fav/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/fav/favicon-16x16.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <title>{% block title %}YaCut — укоротитель ссылок{% endblock title %}</title>
</head>
<body>
        <!-- Блок для flash-сообщений -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="row mb-3">
          <div class="col-sm"></div>
          <div class="col-sm">
            {% for message in messages %}
              <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          </div>
          <div class="col-sm"></div>
        </div>
      {% endif %}
    {% endwith %}
    
    {% include "header.html" %}
        {% block content %}
        {% endblock content %}
    {% include "footer.html" %}
  </body>
</html>
